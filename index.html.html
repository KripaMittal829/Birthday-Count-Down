<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Countdown</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serifSegoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x ; hidden;
    }

    .main-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: auto;
    }

    .screen {
      width: 100%;
      min-height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      position: relative;
      transition: opacity 0.6s ease;
    }

    .screen.active {
      display: flex;
    }

    /* Countdown Screen */
    #countdown-screen {
      background: linear-gradient(135deg, #eb2c75fe 0%, #ad0b44 25%, #ed7daa 50%, #f2317e9e 75%, #FF7AB3 100%);
    }

    .countdown-container {
      text-align: center;
      z-index: 10;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .countdown-container:hover {
      transform: scale(1.02);
    }

    .countdown-title {
      font-size: 4rem;
      color: #ff9ece;
      margin-bottom: 2.5rem;
      text-shadow: 3px 3px 6px rgba(179, 122, 150, 0.4);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .countdown-display {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .time-unit {
      background: rgba(254, 255, 242, 0.95);
      padding: 2.5rem 2rem;
      border-radius: 25px;
      min-width: 130px;
      box-shadow: 0 10px 40px rgba(201, 7, 104, 0.776);
      border: 3px solid #a50052;
      transition: transform 0.3s ease;
    }

    .time-unit:hover {
      transform: translateY(-5px);
    }

    .time-value {
      font-size: 4rem;
      font-weight: 800;
      color: #9a0052;
      text-shadow: 2px 2px 4px rgba(143, 0, 76, 0.605);
    }

    .time-label {
      font-size: 1.1rem;
      color: #b60a60;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
    }

    .next-button {
      margin-top: 3rem;
      padding: 1.2rem 3.5rem;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #8a0447, #ff0088);
      color: rgb(242, 244, 218);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .next-button:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgb(106, 0, 53);
    }

    .next-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Floating animations */
    .floating-heart, .floating-sparkle {
      position: absolute;
      pointer-events: none;
      animation: float-up-soft linear;
      z-index: 1;
      bottom: -80px;
    }

    @keyframes float-up-soft {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      5% {
        opacity: 0.6;
      }
      15% {
        opacity: 0.7;
      }
      50% {
        transform: translateY(-60vh) translateX(15px) rotate(180deg);
        opacity: 0.5;
      }
      85% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-120vh) translateX(-10px) rotate(360deg);
        opacity: 0;
      }
    }

    /* Popup */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(174, 46, 93, 0.84);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.4s ease;
    }

    .popup-overlay.hidden {
      display: none;
    }

    .popup-content {
      background: linear-gradient(135deg, #de85aa, #FFC1E0);
      padding: 3.5rem;
      border-radius: 35px;
      text-align: center;
      box-shadow: 0 15px 60px rgba(145, 4, 75, 0.913);
      animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border: 5px solid #810945;
      max-width: 550px;
      position: relative;
      overflow: hidden;
    }

    .popup-content::before {
      content: '💕';
      position: absolute;
      font-size: 4rem;
      top: -20px;
      right: -20px;
      opacity: 0.3;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes popIn {
      0% {
        transform: scale(0.3) rotate(-10deg);
        opacity: 0;
      }
      70% {
        transform: scale(1.05) rotate(2deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .popup-text {
      font-size: 2.8rem;
      color: #a70458fb;
      font-weight: 800;
      text-shadow: 3px 3px 6px rgb(237, 151, 194);
      position: relative;
      z-index: 1;
    }

    .popup-close {
      margin-top: 2.5rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #be2170, #e5268c);
      color: rgb(244, 247, 228);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(247, 133, 190, 0.954);
    }

    .popup-close:hover {
      background: linear-gradient(135deg, #ba2374, #9c0364);
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(255, 105, 180, 0.7);
    }

    /* Interaction Screens */
    #interaction1-screen, #interaction2-screen {
      background: linear-gradient(135deg, #b00965 0%, #a4044ce8 25%, #f1679f 50%, #b41d64e3 75%, #FF7AB3 100%);
    }

    .question-text {
      font-size: 2.8rem;
      color: #ffe9f5;
      margin-bottom: 3rem;
      text-align: center;
      font-weight: 700;
      text-shadow: 2px 2px 5px rgba(140, 11, 76, 0.829);
      line-height: 1.4;
    }

    .button-group {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .choice-button {
      padding: 1.2rem 3rem;
      font-size: 1.4rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(113, 9, 61, 0.941);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .yes-button {
      background: linear-gradient(135deg, #8d0449, #FF1493);
      color: rgb(253, 255, 241);
    }

    .no-button {
      background: linear-gradient(135deg, #8d0449,#FF1493);
      color: rgb(253, 255, 241);
    }

    .choice-button:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 25px rgb(99, 0, 50);
    }

    /* Dark Theme Screen */
    #dark-screen {
      background: linear-gradient(135deg, #4A0E4E 0%, #81003D 50%, #4A0E4E 100%);
    }

    #dark-screen .question-text {
      color: #FFB3D9;
      text-shadow: 3px 3px 8px rgba(255, 179, 217, 0.5);
    }

    .lights-button {
      padding: 1.2rem 3rem;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #4A0E4E;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
      font-weight: 800;
      letter-spacing: 1px;
    }

    .lights-button:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.7);
      background: linear-gradient(135deg, #FFA500, #FFD700);
    }

    /* Celebration Screen */
    #celebration-screen {
      background: linear-gradient(135deg, #b9256a 0%, #c1155a 25%, #FF9EC4 50%, #bf2563 75%, #FF7AB3 100%);
    }

    .music-button {
      padding: 1.2rem 3rem;
      font-size: 1.4rem;
      background: linear-gradient(135deg,#FF1493, #ad0d63);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgb(167, 22, 90);
      font-weight: 700;
      z-index: 10;
      letter-spacing: 1px;
    }

    .music-button:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 25px rgba(151, 35, 93, 0.769);
    }

    /* Final Screen */
    #final-screen {
      background: linear-gradient(135deg, #eb2c75fe 0%, #ad0b44 25%, #ed7daa 50%, #f2317e9e 75%, #FF7AB3 100%);

    .cake-container {
      position: relative;
      margin-bottom: 3rem;
      animation: bounceIn 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 10;
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0) rotate(-180deg);
        opacity: 0;
      }
      60% {
        transform: scale(1.15) rotate(10deg);
      }
      80% {
        transform: scale(0.95) rotate(-5deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .cake {
      width: 280px;
      height: 320px;
      position: relative;
      filter: drop-shadow(0 6px 25px rgba(241, 89, 165, 0.6));
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% {
        filter: drop-shadow(0 6px 25px rgba(255, 105, 180, 0.6));
      }
      50% {
        filter: drop-shadow(0 8px 35px rgba(255, 105, 180, 0.9));
      }
    }

    .final-message {
      font-size: 2.8rem;
      color: #89093c;
      text-align: center;
      font-weight: 900;
      text-shadow: 2px 2px 8px rgba(255, 127, 206, 0.3);
      line-height: 1.6;
      animation: fadeInUp 1s ease 0.6s both;
      z-index: 10;
      font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      letter-spacing: 2px;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .balloon {
      position: absolute;
      font-size: 3.5rem;
      filter: drop-shadow(0 4px 8px rgba(135, 7, 71, 0.845));
      animation: float-balloon-up linear;
      bottom: -100px;
      opacity: 0.6;
    }

    @keyframes float-balloon-up {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0.6;
      }
      10% {
        opacity: 0.7;
      }
      50% {
        transform: translateY(-50vh) translateX(20px) rotate(10deg);
        opacity: 0.5;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-120vh) translateX(-20px) rotate(-10deg);
        opacity: 0;
      }
    }

    .celebration-element {
      position: absolute;
      font-size: 2.5rem;
      filter: drop-shadow(0 2px 6px rgba(132, 2, 67, 0.772));
      animation: float-down-celebration linear;
      top: -100px;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes float-down-celebration {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      5% {
        opacity: 0.9;
      }
      15% {
        opacity: 1;
      }
      50% {
        transform: translateY(60vh) translateX(-30px) rotate(180deg);
        opacity: 0.8;
      }
      85% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(120vh) translateX(20px) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .countdown-title {
        font-size: 2rem;
      }
      
      .time-unit {
        min-width: 100px;
        padding: 1.5rem 1rem;
      }
      
      .time-value {
        font-size: 3rem;
      }
      
      .question-text {
        font-size: 2rem;
      }
      
      .popup-text {
        font-size: 2rem;
      }
      
      .final-message {
        font-size: 2rem;
      }
      
      .cake {
        width: 200px;
        height: 230px;
      }
    }
  </style>

      look_message: "Have a look, cutie👀",
      dark_message: "Oops… it's dark here 🌙",
      lights_button_text: "Lights On ✨",
      play_music_text: "Play Music 🎶",
      final_message: "Happiest Birthday Aashi! ❤️\nLove you more!🎀🎀"
    };

    let countdownUnlocked = false;
    let countdownInterval;

    // Countdown timer
    function updateCountdown() {
      const targetDate = new Date('2026-01-01T00:00:00').getTime();
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        document.getElementById('next-btn').disabled = false;
        clearInterval(countdownInterval);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    // Create floating elements with more variety
    function createFloatingElement(type, container) {
      const element = document.createElement('div');
      element.className = type === 'heart' ? 'floating-heart' : 'floating-sparkle';
      
      const heartEmojis = ['💕', '💖', '💗', '💓', '💝', '💘'];
      const sparkleEmojis = ['✨', '⭐', '🌟', '💫'];
      
      if (type === 'heart') {
        element.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      } else {
        element.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
      }
      
      element.style.left = Math.random() * 95 + '%';
      element.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
      element.style.animationDelay = '0s';
      const duration = Math.random() * 6 + 10;
      element.style.animationDuration = duration + 's';
      container.appendChild(element);

      setTimeout(() => {
        element.remove();
      }, duration * 1000);
    }

    function startFloatingElements(screenId) {
      const screen = document.getElementById(screenId);
      
      // Don't add floating elements to final screen
      if (screenId === 'final-screen') {
        return;
      }
      
      // More hearts
      setInterval(() => {
        createFloatingElement('heart', screen);
      }, 800);
      
      // More sparkles
      setInterval(() => {
        createFloatingElement('sparkle', screen);
      }, 1200);
    }

    function createBalloons() {
      const screen = document.getElementById('final-screen');
      const balloonEmojis = ['🎈'];
      
      // Create initial batch of pink balloons
      for (let i = 0; i < 12; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.textContent = balloonEmojis[0];
        balloon.style.left = Math.random() * 90 + 5 + '%';
        balloon.style.animationDelay = Math.random() * 2 + 's';
        balloon.style.animationDuration = (Math.random() * 4 + 6) + 's';
        balloon.style.filter = 'hue-rotate(320deg) saturate(1.2) brightness(1.1)';
        screen.appendChild(balloon);
        
        setTimeout(() => {
          balloon.remove();
        }, parseFloat(balloon.style.animationDuration) * 1000 + parseFloat(balloon.style.animationDelay) * 1000);
      }
      
      // Continuously create new pink balloons
      setInterval(() => {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.textContent = balloonEmojis[0];
        balloon.style.left = Math.random() * 90 + 5 + '%';
        balloon.style.animationDelay = '0s';
        const duration = Math.random() * 4 + 6;
        balloon.style.animationDuration = duration + 's';
        balloon.style.filter = 'hue-rotate(320deg) saturate(1.2) brightness(1.1)';
        screen.appendChild(balloon);
        
        setTimeout(() => {
          balloon.remove();
        }, duration * 1000);
      }, 1500);
    }

    function createCelebrationElements() {
      const screen = document.getElementById('final-screen');
      const celebrationEmojis = ['🌷', '🌸', '🎊', '🎉', '✨', '🎁', '🎀'];
      
      // Create initial batch
      for (let i = 0; i < 15; i++) {
        const element = document.createElement('div');
        element.className = 'celebration-element';
        element.textContent = celebrationEmojis[Math.floor(Math.random() * celebrationEmojis.length)];
        element.style.left = Math.random() * 95 + '%';
        element.style.animationDelay = Math.random() * 3 + 's';
        element.style.animationDuration = (Math.random() * 5 + 8) + 's';
        element.style.fontSize = (Math.random() * 1.5 + 2) + 'rem';
        screen.appendChild(element);
        
        setTimeout(() => {
          element.remove();
        }, parseFloat(element.style.animationDuration) * 1000 + parseFloat(element.style.animationDelay) * 1000);
      }
      
      // Continuously create new celebration elements
      setInterval(() => {
        const element = document.createElement('div');
        element.className = 'celebration-element';
        element.textContent = celebrationEmojis[Math.floor(Math.random() * celebrationEmojis.length)];
        element.style.left = Math.random() * 95 + '%';
        element.style.animationDelay = '0s';
        const duration = Math.random() * 5 + 8;
        element.style.animationDuration = duration + 's';
        element.style.fontSize = (Math.random() * 1.5 + 2) + 'rem';
        screen.appendChild(element);
        
        setTimeout(() => {
          element.remove();
        }, duration * 1000);
      }, 1200);
    }

    function closePopup() {
      document.getElementById('popup').classList.add('hidden');
    }

    function unlockNext() {
      if (!countdownUnlocked) {
        countdownUnlocked = true;
        document.getElementById('next-btn').disabled = false;
      }
    }

    function switchScreen(fromId, toId) {
      document.getElementById(fromId).classList.remove('active');
      setTimeout(() => {
        document.getElementById(toId).classList.add('active');
      }, 150);
    }

    function goToInteraction1(event) {
      event.stopPropagation();
      switchScreen('countdown-screen', 'interaction1-screen');
      startFloatingElements('interaction1-screen');
    }

    function goToInteraction2() {
      switchScreen('interaction1-screen', 'interaction2-screen');
      startFloatingElements('interaction2-screen');
      setTimeout(() => {
        switchScreen('interaction2-screen', 'dark-screen');
      }, 2800);
    }

    function handleNo(event) {
      const noBtn = event.target;
      const noBtnText = noBtn.textContent;
      noBtn.textContent = 'Pretty please? 🥺';
      setTimeout(() => {
        noBtn.textContent = noBtnText;
      }, 1800);
    }

    function goToCelebration() {
      switchScreen('dark-screen', 'celebration-screen');
      startFloatingElements('celebration-screen');
    }

    function goToFinal() {
      switchScreen('celebration-screen', 'final-screen');
      createBalloons();
      createCelebrationElements();
      playBirthdayMusic();
    }

    function playBirthdayMusic() {
      // Create audio context for romantic melody inspired by Bollywood love songs
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      
      // Musical notes (in Hz)
      const notes = {
        'C4': 261.63, 'Cs4': 277.18, 'D4': 293.66, 'Ds4': 311.13, 'E4': 329.63, 'F4': 349.23,
        'Fs4': 369.99, 'G4': 392.00, 'Gs4': 415.30, 'A4': 440.00, 'As4': 466.16, 'B4': 493.88,
        'C5': 523.25, 'Cs5': 554.37, 'D5': 587.33, 'Ds5': 622.25, 'E5': 659.25, 'F5': 698.46,
        'Fs5': 739.99, 'G5': 783.99, 'A5': 880.00
      };
      
      // Romantic Bollywood-style melody with flowing, dreamy notes
      const melody = [
        // Opening phrase - gentle and romantic
        {note: 'D5', duration: 0.4}, {note: 'E5', duration: 0.3},
        {note: 'Fs5', duration: 0.5}, {note: 'A5', duration: 0.4},
        {note: 'Fs5', duration: 0.35}, {note: 'E5', duration: 0.35},
        {note: 'D5', duration: 0.6},
        
        // Second phrase - building emotion
        {note: 'Cs5', duration: 0.3}, {note: 'D5', duration: 0.3},
        {note: 'E5', duration: 0.5}, {note: 'Fs5', duration: 0.4},
        {note: 'E5', duration: 0.4}, {note: 'D5', duration: 0.3},
        {note: 'Cs5', duration: 0.7},
        
        // Bridge - expressive
        {note: 'B4', duration: 0.35}, {note: 'Cs5', duration: 0.25},
        {note: 'D5', duration: 0.5}, {note: 'E5', duration: 0.4},
        {note: 'Fs5', duration: 0.6}, {note: 'G5', duration: 0.3},
        {note: 'Fs5', duration: 0.5},
        
        // Climax - peak emotion
        {note: 'A5', duration: 0.5}, {note: 'Fs5', duration: 0.35},
        {note: 'E5', duration: 0.4}, {note: 'D5', duration: 0.45},
        {note: 'E5', duration: 0.5}, {note: 'Fs5', duration: 0.4},
        {note: 'E5', duration: 0.35}, {note: 'D5', duration: 0.8},
        
        // Resolution - gentle ending
        {note: 'Cs5', duration: 0.4}, {note: 'B4', duration: 0.35},
        {note: 'A4', duration: 0.5}, {note: 'Fs4', duration: 0.4},
        {note: 'A4', duration: 0.6}, {note: 'D5', duration: 1.3}
      ];
      
      let startTime = audioContext.currentTime;
      
      melody.forEach((item) => {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = notes[item.note];
        oscillator.type = 'sine';
        
        // Soft, romantic volume with smooth envelope
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.13, startTime + 0.05);
        gainNode.gain.linearRampToValueAtTime(0.09, startTime + item.duration - 0.05);
        gainNode.gain.linearRampToValueAtTime(0, startTime + item.duration);
        
        oscillator.start(startTime);
        oscillator.stop(startTime + item.duration);
        
        startTime += item.duration;
      });
    }

    async function onConfigChange(config) {
      const name = config.birthday_person_name || defaultConfig.birthday_person_name;
      const popupMsg = config.popup_message || defaultConfig.popup_message;
      const question1 = config.next_screen_question || defaultConfig.next_screen_question;
      const yesText = config.yes_button_text || defaultConfig.yes_button_text;
      const noText = config.no_button_text || defaultConfig.no_button_text;
      const lookMsg = config.look_message || defaultConfig.look_message;
      const darkMsg = config.dark_message || defaultConfig.dark_message;
      const lightsText = config.lights_button_text || defaultConfig.lights_button_text;
      const musicText = config.play_music_text || defaultConfig.play_music_text;
      const finalMsg = config.final_message || defaultConfig.final_message;

      document.getElementById('countdown-title').textContent = `${name}'s Birthday Countdown 🌷🎂`;
      document.getElementById('popup-text').textContent = popupMsg;
      document.getElementById('interaction1-text').textContent = question1;
      document.getElementById('yes-btn').textContent = yesText;
      document.getElementById('no-btn').textContent = noText;
      document.getElementById('interaction2-text').textContent = lookMsg;
      document.getElementById('dark-text').textContent = darkMsg;
      document.getElementById('lights-btn').textContent = lightsText;
      document.getElementById('music-btn').textContent = musicText;
      document.getElementById('final-msg').innerHTML = finalMsg.replace(/\n/g, '<br>');
    }

    // Initialize
    countdownInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
    startFloatingElements('countdown-screen');

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['birthday_person_name', config.birthday_person_name || defaultConfig.birthday_person_name],
          ['popup_message', config.popup_message || defaultConfig.popup_message],
          ['next_screen_question', config.next_screen_question || defaultConfig.next_screen_question],
          ['yes_button_text', config.yes_button_text || defaultConfig.yes_button_text],
          ['no_button_text', config.no_button_text || defaultConfig.no_button_text],
          ['look_message', config.look_message || defaultConfig.look_message],
          ['dark_message', config.dark_message || defaultConfig.dark_message],
          ['lights_button_text', config.lights_button_text || defaultConfig.lights_button_text],
          ['play_music_text', config.play_music_text || defaultConfig.play_music_text],
          ['final_message', config.final_message || defaultConfig.final_message]
        ])
      });
    }
  </script>
